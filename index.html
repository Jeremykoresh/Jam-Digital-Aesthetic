<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jam Digital Aesthetic</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #121212;
      font-family: 'Courier New', monospace;
    }

    #jam {
      color: #00ffcc; 
      font-size: 5rem; 
      font-weight: bold;
      background: #1e1e1e;
      padding: 20px 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.4), inset 0 0 10px rgba(0, 255, 204, 0.1); 
      text-shadow: 0 0 10px #00ffcc;
    }
  </style>
</head>
<body>
  <div id="jam">00:00:00</div>
  
  <script>
    setInterval(() => {
      const waktu = new Date().toLocaleTimeString('en-GB'); 
      document.getElementById('jam').innerText = waktu;
    }, 1000);
  </script>
</body>
</html>
